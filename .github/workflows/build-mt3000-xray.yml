name: Build luci-app-xray for GL-MT3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-setuptools \
            rsync unzip zlib1g-dev file wget curl ca-certificates

      - name: Clone GL.iNet mt7981 OpenWrt SDK
        run: |
          git clone --depth=1 https://github.com/gl-inet-builder/openwrt-sdk-mt7981.git sdk

      - name: Clone luci-app-xray fork compatible with 21.02
        run: |
          git clone --depth=1 https://github.com/ttimasdf/luci-app-xray.git package_src

      - name: Link package into SDK
        run: |
          mkdir -p sdk/package/luci-app-xray
          cp -r package_src/* sdk/package/luci-app-xray/

      - name: Fix broken feeds and update only required feeds
        run: |
          cd sdk
          echo "===== Original feeds.conf.default ====="
          cat feeds.conf.default || true

          sed -i '/mtk_openwrt_feed/s/^/# /' feeds.conf.default || true

          echo "===== Fixed feeds.conf.default ====="
          cat feeds.conf.default || true

          ./scripts/feeds update -i
          ./scripts/feeds install -a

      - name: Prepare minimal config
        run: |
          cd sdk
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci-app-xray=m
          EOF
          make defconfig

      - name: Build luci-app-xray
        run: |
          cd sdk
          make package/luci-app-xray/compile -j"$(nproc)" V=s

      - name: Collect artifacts
        run: |
          mkdir -p out
          find sdk/bin/packages -type f -name "*.ipk" | xargs -r cp -t out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt3000-luci-app-xray
          path: out/*
