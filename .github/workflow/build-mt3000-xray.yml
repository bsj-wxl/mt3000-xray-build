name: Build luci-app-xray for GL-MT3000 (OpenWrt 21.02-SNAPSHOT mt7981)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync \
            unzip zlib1g-dev file wget curl

      - name: Clone GL.iNet mt7981 OpenWrt SDK
        run: |
          git clone --depth=1 https://github.com/gl-inet-builder/openwrt-sdk-mt7981.git sdk

      - name: Clone luci-app-xray fork compatible with 21.02
        run: |
          git clone --depth=1 https://github.com/ttimasdf/luci-app-xray.git package_src

      - name: Link package into SDK
        run: |
          mkdir -p sdk/package/luci-app-xray
          cp -r package_src/* sdk/package/luci-app-xray/

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare minimal config
        run: |
          cd sdk
          cat >> .config <<'EOF'
          CONFIG_PACKAGE_luci-app-xray=m
          EOF
          make defconfig

      - name: Build luci-app-xray
        run: |
          cd sdk
          make package/luci-app-xray/compile -j"$(nproc)" V=s

      - name: Collect artifacts
        run: |
          mkdir -p out
          find sdk/bin/packages -type f \( -name "*.ipk" -o -name "*.apk" \) | xargs -r cp -t out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt3000-luci-app-xray
          path: out/*
